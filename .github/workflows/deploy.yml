name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install & Build
        run: |
          npm install --legacy-peer-deps
          npm run build

      - name: Push dist to deploy branch
        run: |
          cd dist
          git init
          git config user.email "deploy@github.com"
          git config user.name "GitHub Actions"
          git add .
          git commit -m "Deploy"
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/samcgchess123-ops/ally-grow-secure.git HEAD:dist
